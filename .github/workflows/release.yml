name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install dependencies
        run: brew install pkg-config libogg libvorbis flac
      - name: Build
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o yamp-darwin-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-darwin-arm64
          path: yamp-darwin-arm64

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install x86_64 dependencies via Homebrew
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          arch -x86_64 /usr/local/bin/brew install pkg-config libogg libvorbis flac 2>/dev/null || brew install pkg-config libogg libvorbis flac
      - name: Build
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o yamp-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-darwin-amd64
          path: yamp-darwin-amd64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libogg-dev libvorbis-dev libflac-dev pkg-config
      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o yamp-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-linux-amd64
          path: yamp-linux-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        run: go build -ldflags="-s -w" -o yamp-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-windows-amd64.exe
          path: yamp-windows-amd64.exe

  release:
    needs: [build-macos-arm64, build-macos-amd64, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files and checksums
        run: |
          cd artifacts
          find . -type f -name 'yamp-*' -exec mv {} . \;
          sha256sum yamp-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/yamp-*
            artifacts/checksums.txt
