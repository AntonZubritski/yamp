name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o yamp-darwin-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-darwin-${{ matrix.goarch }}
          path: yamp-darwin-${{ matrix.goarch }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o yamp-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-linux-amd64
          path: yamp-linux-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        run: go build -ldflags="-s -w" -o yamp-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: yamp-windows-amd64.exe
          path: yamp-windows-amd64.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files and checksums
        run: |
          cd artifacts
          find . -type f -name 'yamp-*' -exec mv {} . \;
          sha256sum yamp-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/yamp-*
            artifacts/checksums.txt
